<h1>Autori</h1>

<a href="{% url 'author_create' %}">Pridať autora</a>

<ul>
{% for author in authors %}
    <li>
        {{ author.name }} {{ author.surname }}
        {% if user.is_staff %}
        <a href="{% url 'author_update' author.id %}">Edit</a>
        <a href="{% url 'author_delete' author.id %}">Delete</a>
        {% endif %}
        
    </li>
{% endfor %}
</ul>
